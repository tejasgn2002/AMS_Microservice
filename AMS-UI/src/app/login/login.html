<div class="bg-light py-3 py-md-5">
  <div class="container">
    <div class="row justify-content-md-center">
      <div class="col-12 col-md-11 col-lg-8 col-xl-7 col-xxl-6">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm">
          <div class="row">
            <div class="col-12">
              <div class="mb-5">
                <h2 class="h3">Login</h2>
                <h3 class="fs-6 fw-normal text-secondary m-0">Enter your details to login</h3>
              </div>
            </div>
          </div>
          <form [formGroup]="loginForm" noValidate (ngSubmit)="onSubmit()">
            <div class="row gy-3 gy-md-4 overflow-hidden">
              <div class="col-12">
                <label for="username" class="form-label"
                  >Username <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  formControlName="username"
                />
              </div>
              <div class="col-12">
                <label for="password" class="form-label"
                  >Password <span class="text-danger">*</span></label
                >
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  id="password"
                  formControlName="password"
                  required
                />
              </div>
              <div class="col-12">
                <div class="d-grid">
                  <button [disabled]="loginForm.invalid" class="btn btn-lg btn-primary" type="submit">Login</button>
                </div>
              </div>
              <div class="col-12">
                <div class="d-grid">
                  <p class="text-danger text-center m-0" *ngIf="errormessage">{{errormessage}}</p>
                </div>
              </div>
              
            </div>
          </form>
          <div class="row">
            <div class="col-12">
              <hr class="mt-5 mb-4 border-secondary-subtle" />
              <div class="col-12">
                <p class="m-0 text-secondary text-center">
                  Don't have an account?
                  <a class="link-primary text-decoration-none" routerLink="/">Sign up</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
